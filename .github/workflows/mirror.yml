name: Mirror to thedecisionstack/tools

on:
  push:
    branches:
      - main
      - development
  workflow_dispatch:

concurrency:
  group: mirror
  cancel-in-progress: false

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source (full history, all branches)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to thedecisionstack/tools
        env:
          MIRROR_PAT: ${{ secrets.MIRROR_PAT }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote add mirror "https://x-access-token:${MIRROR_PAT}@github.com/thedecisionstack/tools.git"
          git push mirror --all --force
          git push mirror --tags --force
